---
name: 3 - Restart Apps

on:
  workflow_dispatch:
  schedule:
    - cron: '11/30 * * * *'

permissions:
  contents: read
  id-token: write
  actions: write

jobs:
  restart-staging:
    name: restart (staging)
    uses: gsa/data.gov/.github/workflows/app-restart-template.yml@deldel
    with:
      environ: staging
      app_names: "{\"include\":[{\"app\":\"catalog-proxy\"}]}"
    secrets:
      CF_SERVICE_USER: ${{ secrets.CF_SERVICE_USER }}
      CF_SERVICE_AUTH: ${{ secrets.CF_SERVICE_AUTH }}

  # restart-prod:
