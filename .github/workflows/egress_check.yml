---
name: 6 - Check Egress Operation

on:
  schedule:
    - cron: '40 02,14 * * *'
  workflow_dispatch:

jobs:
  egress-check:
    name: ${{matrix.app}} - ${{matrix.environ}} - ${{matrix.command}}
    runs-on: ubuntu-latest
    environment: ${{ matrix.environ }}
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        command:
          - 'HTTPSTest || python -c \"import requests,sys; sys.exit(requests.get(''http://gsa.gov'').status_code!=403)\"'
          - 'GoodDomainTest || python -c \"import requests,sys; sys.exit(requests.get(''https://gsa.gov'').status_code!=200)\"'
          - 'BadDomainTest || python -c \"import requests,sys; sys.exit(requests.get(''https://yahoo.com'').status_code!=403)\"'
        environ: ['development', 'staging', 'prod']
        app:
          - 'catalog-admin'
          - 'catalog-web'
          - 'catalog-fetch'
          - 'catalog-gather'

    steps:
      - name: Store Instance Name
        run: |
          INSTANCE_NAME="$(echo egress-check-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT})"
          echo "INSTANCE_NAME=${INSTANCE_NAME}" | tee -a $GITHUB_ENV
      - name: checkout
        uses: actions/checkout@v4
      - name: run task
        uses: cloud-gov/cg-cli-tools@main
        with:
          command: >
            cf run-task ${{ matrix.app }} --command "${{ matrix.command }}"
            --name $INSTANCE_NAME -k 1500M -m 150M
          cf_org: gsa-datagov
          cf_space: ${{ matrix.environ }}
          cf_username: ${{secrets.CF_SERVICE_USER}}
          cf_password: ${{secrets.CF_SERVICE_AUTH}}
      - name: monitor task output
        uses: cloud-gov/cg-cli-tools@main
        with:
          command: >
            tools/monitor_cf_logs.sh ${{ matrix.app }} $INSTANCE_NAME
          cf_org: gsa-datagov
          cf_space: ${{ matrix.environ }}
          cf_username: ${{secrets.CF_SERVICE_USER}}
          cf_password: ${{secrets.CF_SERVICE_AUTH}}
